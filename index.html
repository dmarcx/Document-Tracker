<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מעקב מסמכים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Tokens ─────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --card: #22263a;
            --border: #2e3352;
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --text: #e8eaf6;
            --muted: #7b82a8;
            --red: #ff4d6d;
            --orange: #fb923c;
            --green: #4ade80;
            --red-bg: rgba(255, 77, 109, 0.12);
            --orange-bg: rgba(251, 146, 60, 0.12);
            --green-bg: rgba(74, 222, 128, 0.12);
            --radius: 14px;
            --shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 80px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, .18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 139, 250, .12) 0%, transparent 55%);
        }

        /* ── Header ─────────────────────────────────── */
        header {
            max-width: 720px;
            margin: 0 auto 36px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -.5px;
            margin-bottom: 6px;
        }

        header p {
            color: var(--muted);
            font-size: .95rem;
        }

        /* ── Cards / Forms ───────────────────────────── */
        .form-card {
            max-width: 720px;
            margin: 0 auto 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 22px;
            box-shadow: var(--shadow);
        }

        .form-card h2 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        @media(max-width:540px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        label {
            display: block;
            font-size: .76rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        textarea {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Heebo', sans-serif;
            font-size: .95rem;
            padding: 10px 13px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            direction: rtl;
            resize: vertical;
            min-height: 72px;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, .2);
        }

        .doc-notes {
            margin-top: 5px;
            font-size: .8rem;
            color: var(--muted);
            white-space: pre-wrap;
            word-break: break-word;
        }

        input,
        select {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Heebo', sans-serif;
            font-size: .95rem;
            padding: 10px 13px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            direction: rtl;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, .2);
        }

        select option {
            background: var(--card);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(.8);
            cursor: pointer;
        }

        /* ── Buttons ─────────────────────────────────── */
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }

        .btn-primary:hover {
            opacity: .9;
        }

        .btn-primary:active {
            transform: scale(.98);
        }

        .btn-ghost {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Heebo', sans-serif;
            font-size: .85rem;
            padding: 6px 12px;
            cursor: pointer;
            transition: border-color .2s, color .2s;
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Custom-type row ─────────────────────────── */
        .type-manager {
            max-width: 720px;
            margin: 0 auto 28px;
        }

        /* toggle link */
        .type-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--muted);
            font-size: .82rem;
            font-weight: 600;
            user-select: none;
            width: fit-content;
            margin: 0 auto 0;
            transition: color .2s;
        }

        .type-toggle:hover {
            color: var(--accent2);
        }

        .type-toggle .arrow {
            transition: transform .25s;
            display: inline-block;
        }

        .type-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .type-panel {
            overflow: hidden;
            max-height: 0;
            transition: max-height .3s ease, opacity .3s;
            opacity: 0;
        }

        .type-panel.open {
            max-height: 300px;
            opacity: 1;
        }

        .type-panel-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-top: 10px;
        }

        .type-panel-inner h3 {
            font-size: .9rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--accent2);
        }

        .type-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .type-add-row input {
            flex: 1;
        }

        .type-add-row .emoji-input {
            max-width: 70px;
            text-align: center;
            font-size: 1.2rem;
        }

        .type-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .type-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: .8rem;
            font-weight: 600;
        }

        .type-chip.builtin {
            color: var(--muted);
        }

        .type-chip.custom {
            border-color: var(--accent);
            color: var(--accent2);
        }

        .type-chip .del-type {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: .85rem;
            padding: 0 2px;
            transition: color .15s;
        }

        .type-chip .del-type:hover {
            color: var(--red);
        }

        /* ── Stats bar ───────────────────────────────── */
        .stats {
            max-width: 720px;
            margin: 0 auto 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-chip {
            flex: 1;
            min-width: 130px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            text-align: center;
        }

        .stat-chip .num {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .stat-chip .lbl {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .stat-chip.red {
            border-color: var(--red);
            background: var(--red-bg);
        }

        .stat-chip.orange {
            border-color: var(--orange);
            background: var(--orange-bg);
        }

        .stat-chip.green {
            border-color: var(--green);
            background: var(--green-bg);
        }

        .stat-chip.red .num {
            color: var(--red);
        }

        .stat-chip.orange .num {
            color: var(--orange);
        }

        .stat-chip.green .num {
            color: var(--green);
        }

        /* ── List header ─────────────────────────────── */
        .list-header {
            max-width: 720px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-header h2 {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .list-header .count {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: .8rem;
            color: var(--muted);
        }

        .doc-list {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Document card ───────────────────────────── */
        .doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: transform .15s, box-shadow .15s;
            animation: slideIn .25s ease;
        }

        .doc-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .doc-card::before {
            content: '';
            display: block;
            width: 4px;
            min-height: 50px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .doc-card.red {
            border-color: var(--red);
            background: var(--red-bg);
        }

        .doc-card.orange {
            border-color: var(--orange);
            background: var(--orange-bg);
        }

        .doc-card.green {
            border-color: var(--green);
            background: var(--green-bg);
        }

        .doc-card.red ::before {
            background: var(--red);
        }

        .doc-card.orange ::before {
            background: var(--orange);
        }

        .doc-card.green ::before {
            background: var(--green);
        }

        .doc-card .icon {
            font-size: 1.8rem;
            flex-shrink: 0;
            width: 40px;
            text-align: center;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-info .name {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-info .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .doc-info .type-badge {
            background: rgba(255, 255, 255, .07);
            border-radius: 6px;
            padding: 2px 9px;
            font-size: .72rem;
            font-weight: 600;
            color: var(--muted);
        }

        .doc-info .date-str {
            font-size: .82rem;
            color: var(--muted);
        }

        .doc-card .urgency {
            font-size: .78rem;
            font-weight: 700;
            text-align: center;
            flex-shrink: 0;
            min-width: 80px;
        }

        .doc-card.red .urgency {
            color: var(--red);
        }

        .doc-card.orange .urgency {
            color: var(--orange);
        }

        .doc-card.green .urgency {
            color: var(--green);
        }

        .card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-icon {
            background: none;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 5px 7px;
            transition: color .2s, border-color .2s, background .2s;
        }

        .btn-icon.edit:hover {
            color: var(--accent2);
            border-color: var(--accent2);
            background: rgba(167, 139, 250, .08);
        }

        .btn-icon.del:hover {
            color: var(--red);
            border-color: var(--red);
            background: rgba(255, 77, 109, .08);
        }

        /* ── Empty state ─────────────────────────────── */
        .empty {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
            padding: 64px 0;
            color: var(--muted);
        }

        .empty .emoji {
            font-size: 3.5rem;
            margin-bottom: 14px;
        }

        /* ── Modal overlay ───────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(4px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .6);
            animation: popIn .22s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(.93);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal .field {
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .modal-actions .btn-primary {
            flex: 1;
        }

        .btn-cancel {
            flex: 0 0 auto;
            padding: 12px 18px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'Heebo', sans-serif;
            font-size: .95rem;
            cursor: pointer;
            transition: border-color .2s, color .2s;
        }

        .btn-cancel:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        /* ── Inline quick-add type row ─────────────── */
        .quick-add-type {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            animation: fadein .15s ease;
        }

        .quick-add-type.visible {
            display: flex;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(-4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .quick-add-type .emoji-q {
            width: 58px;
            text-align: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .quick-add-type .name-q {
            flex: 1;
        }

        .quick-add-type .btn-ok {
            flex-shrink: 0;
            padding: 9px 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Heebo', sans-serif;
            font-size: .85rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }

        .quick-add-type .btn-ok:hover {
            opacity: .85;
        }

        .quick-add-type .btn-x {
            flex-shrink: 0;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: .85rem;
            padding: 9px 10px;
            cursor: pointer;
            transition: color .2s, border-color .2s;
        }

        .quick-add-type .btn-x:hover {
            color: var(--red);
            border-color: var(--red);
        }

        /* ── Toast ───────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--accent);
            color: #fff;
            padding: 11px 22px;
            border-radius: 30px;
            font-size: .9rem;
            font-weight: 600;
            box-shadow: 0 6px 24px rgba(108, 99, 255, .5);
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
            z-index: 999;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── Loading overlay ─────────────────────────── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .75s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-overlay p {
            color: var(--muted);
            font-size: .9rem;
        }

        /* ── Auth overlay ────────────────────────────── */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, .18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 139, 250, .12) 0%, transparent 55%);
            z-index: 1500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #auth-overlay.open {
            display: flex;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 44px 36px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
            animation: popIn .3s ease;
        }

        .auth-logo {
            font-size: 3.2rem;
            margin-bottom: 16px;
            line-height: 1;
        }

        .auth-card h2 {
            font-size: 1.65rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -.5px;
        }

        .auth-card > p {
            color: var(--muted);
            font-size: .88rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 11px;
            width: 100%;
            padding: 13px 20px;
            background: #fff;
            border: none;
            border-radius: 10px;
            color: #3c4043;
            font-family: 'Heebo', sans-serif;
            font-size: .98rem;
            font-weight: 700;
            cursor: pointer;
            transition: box-shadow .2s, transform .1s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .28);
            direction: ltr;
        }

        .btn-google:hover {
            box-shadow: 0 4px 18px rgba(0, 0, 0, .38);
        }

        .btn-google:active {
            transform: scale(.98);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── Header user info ────────────────────────── */
        .header-user {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }

        .user-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--border);
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-name-text {
            font-size: .82rem;
            color: var(--muted);
            font-weight: 500;
        }

        .btn-logout {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Heebo', sans-serif;
            font-size: .78rem;
            font-weight: 600;
            padding: 4px 11px;
            cursor: pointer;
            transition: border-color .2s, color .2s;
        }

        .btn-logout:hover {
            border-color: var(--red);
            color: var(--red);
        }
    </style>
</head>

<body>

    <!-- ── Loading overlay ──────────────────────────── -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>טוען...</p>
    </div>

    <!-- ── Auth overlay ─────────────────────────────── -->
    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">📋</div>
            <h2>מעקב מסמכים</h2>
            <p>התחבר כדי לגשת למסמכים שלך<br>ולסנכרן בין כל המכשירים שלך</p>
            <button class="btn-google" onclick="signInWithGoogle()">
                <!-- Google "G" logo SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.8 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                    <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.3C29.2 35.3 26.7 36 24 36c-5.2 0-9.6-3.2-11.3-7.8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
                    <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.4 4.2-4.4 5.5l6.2 5.3C36.9 38.2 44 33 44 24c0-1.3-.1-2.7-.4-3.9z"/>
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <header>
        <h1>📋 מעקב מסמכים</h1>
        <p>עקוב אחר תוקף המסמכים שלך בקלות</p>
        <div class="header-user" id="header-user" style="display:none">
            <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none" />
            <span class="user-name-text" id="user-name"></span>
            <button class="btn-logout" onclick="logout()">התנתק</button>
        </div>
    </header>

    <!-- Add document form -->
    <div class="form-card">
        <h2>➕ הוספת מסמך חדש</h2>
        <div class="form-row">
            <div>
                <label for="doc-name">שם המסמך</label>
                <input type="text" id="doc-name" placeholder="למשל: ביטוח רכב" maxlength="60" />
            </div>
            <div>
                <label for="doc-type">סוג</label>
                <select id="doc-type" onchange="onTypeChange(this,'quick-add-main')"></select>
                <div class="quick-add-type" id="quick-add-main">
                    <input class="emoji-q" type="text" id="qa-main-icon" placeholder="😀" maxlength="4" />
                    <input class="name-q" type="text" id="qa-main-name" placeholder="שם הסוג החדש..." maxlength="30" />
                    <button class="btn-ok"
                        onclick="confirmQuickType('doc-type','quick-add-main','qa-main-icon','qa-main-name')">הוסף</button>
                    <button class="btn-x" onclick="cancelQuickType('doc-type','quick-add-main')">✕</button>
                </div>
            </div>
            <div>
                <label for="doc-date">תאריך פקיעה</label>
                <input type="date" id="doc-date" />
            </div>
        </div>
        <div style="margin-bottom:16px">
            <label for="doc-notes">הערות</label>
            <textarea id="doc-notes" placeholder="הערות חופשיות (אופציונלי)..." maxlength="500"></textarea>
        </div>
        <button class="btn-primary" onclick="addDocument()">הוסף מסמך</button>
    </div>

    <!-- Type manager toggle -->
    <div class="type-manager">
        <div class="type-toggle" id="type-toggle" onclick="toggleTypePanel()">
            <span>⚙️ ניהול סוגי מסמכים</span>
            <span class="arrow">▾</span>
        </div>
        <div class="type-panel" id="type-panel">
            <div class="type-panel-inner">
                <h3>➕ הוסף סוג חדש</h3>
                <div class="type-add-row">
                    <input class="emoji-input" type="text" id="new-type-emoji" placeholder="😀" maxlength="4" />
                    <input type="text" id="new-type-name" placeholder="שם הסוג..." maxlength="30" />
                    <button class="btn-ghost" onclick="addCustomType()">הוסף</button>
                </div>
                <div class="type-chips" id="type-chips"></div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats-bar"></div>

    <!-- List header -->
    <div class="list-header">
        <h2>המסמכים שלי</h2>
        <span class="count" id="doc-count">0 מסמכים</span>
    </div>

    <!-- Document cards -->
    <div class="doc-list" id="doc-list"></div>
    <div class="empty" id="empty-state" style="display:none">
        <div class="emoji">🗂️</div>
        <p>אין מסמכים עדיין — הוסף את המסמך הראשון שלך!</p>
    </div>

    <!-- Edit modal -->
    <div class="modal-overlay" id="edit-modal" onclick="handleOverlayClick(event)">
        <div class="modal">
            <h2>✏️ עריכת מסמך</h2>
            <input type="hidden" id="edit-id" />
            <div class="field">
                <label for="edit-name">שם המסמך</label>
                <input type="text" id="edit-name" maxlength="60" />
            </div>
            <div class="field">
                <label for="edit-type">סוג</label>
                <select id="edit-type" onchange="onTypeChange(this,'quick-add-edit')"></select>
                <div class="quick-add-type" id="quick-add-edit">
                    <input class="emoji-q" type="text" id="qa-edit-icon" placeholder="😀" maxlength="4" />
                    <input class="name-q" type="text" id="qa-edit-name" placeholder="שם הסוג החדש..." maxlength="30" />
                    <button class="btn-ok"
                        onclick="confirmQuickType('edit-type','quick-add-edit','qa-edit-icon','qa-edit-name')">הוסף</button>
                    <button class="btn-x" onclick="cancelQuickType('edit-type','quick-add-edit')">✕</button>
                </div>
            </div>
            <div class="field">
                <label for="edit-date">תאריך פקיעה</label>
                <input type="date" id="edit-date" />
            </div>
            <div class="field">
                <label for="edit-notes">הערות</label>
                <textarea id="edit-notes" placeholder="הערות חופשיות (אופציונלי)..." maxlength="500"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">ביטול</button>
                <button class="btn-primary" onclick="saveEdit()">שמור שינויים</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp }
            from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, collection, doc as fsDoc, addDoc, setDoc, deleteDoc as fsDeleteDoc, onSnapshot }
            from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

        /* ── Firebase init ────────────────────────────── */
        const firebaseConfig = {
            apiKey: "AIzaSyBWoYrI0Y4Dl3mxX-U88bBtluZdBervkEY",
            authDomain: "document-tracker-95417.firebaseapp.com",
            projectId: "document-tracker-95417",
            storageBucket: "document-tracker-95417.firebasestorage.app",
            messagingSenderId: "611693388638",
            appId: "1:611693388638:web:ab82da0118f523057425cf"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        /* ── App state ────────────────────────────────── */
        let currentUser  = null;
        let docs         = [];
        let customTypes  = [];
        let unsubDocs    = null;
        let unsubConfig  = null;

        /* ── Constants ────────────────────────────────── */
        const BUILTIN_TYPES = [
            { name: 'ביטוח', icon: '🛡️' },
            { name: 'דרכון', icon: '🛂' },
            { name: 'פק"מ',  icon: '🏦' },
            { name: 'אחר',   icon: '📄' },
        ];
        const MS_DAY       = 86_400_000;
        const ADD_SENTINEL = '__add__';

        /* ── Auth state observer ──────────────────────── */
        onAuthStateChanged(auth, user => {
            document.getElementById('loading-overlay').style.display = 'none';

            if (user) {
                currentUser = user;

                // Show user info in header
                const headerUser = document.getElementById('header-user');
                headerUser.style.display = 'flex';
                document.getElementById('user-name').textContent = user.displayName || user.email;
                const avatarEl = document.getElementById('user-avatar');
                if (user.photoURL) {
                    avatarEl.src = user.photoURL;
                    avatarEl.style.display = '';
                }

                // Hide auth overlay, subscribe to data
                document.getElementById('auth-overlay').classList.remove('open');
                subscribeToUserData(user.uid);

            } else {
                currentUser = null;
                unsubscribeFromUserData();
                docs        = [];
                customTypes = [];

                document.getElementById('auth-overlay').classList.add('open');
                document.getElementById('header-user').style.display = 'none';
                render();
            }
        });

        /* ── Firestore subscriptions ──────────────────── */
        function subscribeToUserData(uid) {
            // Real-time listener for documents
            unsubDocs = onSnapshot(
                collection(db, 'users', uid, 'documents'),
                snap => {
                    docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                },
                () => showToast('❌ שגיאה בטעינת מסמכים')
            );

            // Real-time listener for custom types
            unsubConfig = onSnapshot(
                fsDoc(db, 'users', uid, 'config'),
                snap => {
                    customTypes = snap.exists() ? (snap.data().customTypes || []) : [];
                    populateTypeSelects();
                    renderTypeChips();
                }
            );
        }

        function unsubscribeFromUserData() {
            if (unsubDocs)   { unsubDocs();   unsubDocs   = null; }
            if (unsubConfig) { unsubConfig(); unsubConfig = null; }
        }

        /* Save custom types to Firestore (optimistic update) */
        async function persistCustomTypes(newTypes) {
            customTypes = newTypes;
            populateTypeSelects();
            renderTypeChips();
            if (currentUser) {
                await setDoc(
                    fsDoc(db, 'users', currentUser.uid, 'config'),
                    { customTypes: newTypes }
                );
            }
        }

        /* ── Auth actions (exposed globally) ──────────── */
        window.signInWithGoogle = async () => {
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
            } catch (err) {
                showToast('❌ ' + (err.message || 'שגיאה בהתחברות'));
            }
        };

        window.logout = async () => {
            unsubscribeFromUserData();
            await signOut(auth);
            showToast('👋 התנתקת בהצלחה');
        };

        /* ── Helper functions ─────────────────────────── */
        function allTypes() { return [...BUILTIN_TYPES, ...customTypes]; }
        function iconFor(typeName) {
            return (allTypes().find(t => t.name === typeName) || {}).icon || '📄';
        }

        function daysUntil(dateStr) {
            const exp = new Date(dateStr).setHours(0, 0, 0, 0);
            const now = new Date().setHours(0, 0, 0, 0);
            return Math.round((exp - now) / MS_DAY);
        }
        function urgencyClass(days) {
            if (days <= 30) return 'red';
            if (days <= 60) return 'orange';
            return 'green';
        }
        function urgencyLabel(days) {
            if (days < 0)  return `⚠️ פג לפני ${Math.abs(days)} ימים`;
            if (days === 0) return '🔴 פג היום!';
            if (days <= 30) return `🔴 ${days} ימים`;
            if (days <= 60) return `🟠 ${days} ימים`;
            return `🟢 ${days} ימים`;
        }
        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }
        function esc(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        /* ── Toast ────────────────────────────────────── */
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
        }

        /* ── Type selects ─────────────────────────────── */
        function populateTypeSelects(selectedName = '') {
            const types = allTypes();
            const opts  = types.map(t =>
                `<option value="${esc(t.name)}" ${t.name === selectedName ? 'selected' : ''}>${t.icon} ${esc(t.name)}</option>`
            ).join('');
            const addOpt = `<option value="${ADD_SENTINEL}" style="color:var(--accent2);font-style:italic">✚ הוסף סוג...</option>`;
            ['doc-type', 'edit-type'].forEach(id => {
                document.getElementById(id).innerHTML = opts + addOpt;
            });
        }

        window.onTypeChange = (sel, panelId) => {
            const panel = document.getElementById(panelId);
            if (sel.value === ADD_SENTINEL) {
                panel.classList.add('visible');
                panel.querySelector('.name-q').focus();
            } else {
                panel.classList.remove('visible');
            }
        };

        window.confirmQuickType = async (selId, panelId, iconInputId, nameInputId) => {
            const icon = document.getElementById(iconInputId).value.trim() || '📄';
            const name = document.getElementById(nameInputId).value.trim();
            if (!name) { showToast('⚠️ נא לרשום שם לסוג'); return; }
            if (allTypes().some(t => t.name === name)) { showToast('⚠️ סוג כזה כבר קיים'); return; }

            await persistCustomTypes([...customTypes, { name, icon }]);
            populateTypeSelects(name);

            document.getElementById(iconInputId).value = '';
            document.getElementById(nameInputId).value = '';
            document.getElementById(panelId).classList.remove('visible');
            showToast(`✅ הסוג "${name}" נוסף ונבחר`);
        };

        window.cancelQuickType = (selId, panelId) => {
            const sel      = document.getElementById(selId);
            const firstReal = [...sel.options].find(o => o.value !== ADD_SENTINEL);
            if (firstReal) sel.value = firstReal.value;
            document.getElementById(panelId).classList.remove('visible');
        };

        /* ── Type chips ───────────────────────────────── */
        function renderTypeChips() {
            const chipsEl      = document.getElementById('type-chips');
            const builtinChips = BUILTIN_TYPES.map(t =>
                `<span class="type-chip builtin">${t.icon} ${esc(t.name)}</span>`
            ).join('');
            const customChips  = customTypes.map(t =>
                `<span class="type-chip custom">
                    ${esc(t.icon)} ${esc(t.name)}
                    <button class="del-type" title="מחק סוג" onclick="deleteCustomType('${esc(t.name)}')">✕</button>
                </span>`
            ).join('');
            chipsEl.innerHTML = builtinChips + customChips;
        }

        window.addCustomType = async () => {
            const icon = document.getElementById('new-type-emoji').value.trim() || '📄';
            const name = document.getElementById('new-type-name').value.trim();
            if (!name) { showToast('⚠️ נא לרשום שם לסוג'); return; }
            if (allTypes().some(t => t.name === name)) { showToast('⚠️ סוג כזה כבר קיים'); return; }

            await persistCustomTypes([...customTypes, { name, icon }]);
            document.getElementById('new-type-emoji').value = '';
            document.getElementById('new-type-name').value  = '';
            showToast(`✅ הסוג "${name}" נוסף`);
        };

        window.deleteCustomType = async name => {
            await persistCustomTypes(customTypes.filter(t => t.name !== name));
            showToast(`🗑️ הסוג "${name}" נמחק`);
        };

        window.toggleTypePanel = () => {
            document.getElementById('type-toggle').classList.toggle('open');
            document.getElementById('type-panel').classList.toggle('open');
        };

        /* ── Render ───────────────────────────────────── */
        function render() {
            const list    = document.getElementById('doc-list');
            const empty   = document.getElementById('empty-state');
            const countEl = document.getElementById('doc-count');
            const statsEl = document.getElementById('stats-bar');

            list.innerHTML = '';
            countEl.textContent = `${docs.length} מסמכים`;

            let red = 0, orange = 0, green = 0;
            docs.forEach(d => {
                const cl = urgencyClass(daysUntil(d.date));
                if (cl === 'red') red++; else if (cl === 'orange') orange++; else green++;
            });
            statsEl.innerHTML = `
                <div class="stat-chip red">   <div class="num">${red}</div>    <div class="lbl">דחוף / פג</div></div>
                <div class="stat-chip orange"><div class="num">${orange}</div> <div class="lbl">עומד לפוג</div></div>
                <div class="stat-chip green"> <div class="num">${green}</div>  <div class="lbl">בסדר</div></div>`;

            if (docs.length === 0) { empty.style.display = 'block'; return; }
            empty.style.display = 'none';

            const sorted = [...docs].sort((a, b) => new Date(a.date) - new Date(b.date));
            sorted.forEach(d => {
                const days = daysUntil(d.date);
                const cls  = urgencyClass(days);
                const card = document.createElement('div');
                card.className = `doc-card ${cls}`;
                card.innerHTML = `
                    <div class="icon">${iconFor(d.type)}</div>
                    <div class="doc-info">
                        <div class="name">${esc(d.name)}</div>
                        <div class="meta">
                            <span class="type-badge">${esc(d.type)}</span>
                            <span class="date-str">פקיעה: ${formatDate(d.date)}</span>
                        </div>
                        ${d.notes ? `<div class="doc-notes">${esc(d.notes)}</div>` : ''}
                    </div>
                    <div class="urgency">${urgencyLabel(days)}</div>
                    <div class="card-actions">
                        <button class="btn-icon edit" title="עריכה" onclick="openEdit('${d.id}')">✏️</button>
                        <button class="btn-icon del"  title="מחיקה" onclick="removeDoc('${d.id}')">🗑️</button>
                    </div>`;
                list.appendChild(card);
            });
        }

        /* ── CRUD — Documents ─────────────────────────── */
        window.addDocument = async () => {
            const name  = document.getElementById('doc-name').value.trim();
            const type  = document.getElementById('doc-type').value;
            const date  = document.getElementById('doc-date').value;
            const notes = document.getElementById('doc-notes').value.trim();
            if (!name)                  { showToast('⚠️ נא להזין שם מסמך');    return; }
            if (!date)                  { showToast('⚠️ נא לבחור תאריך פקיעה'); return; }
            if (type === ADD_SENTINEL)  { showToast('⚠️ נא לבחור סוג מסמך');   return; }
            try {
                await addDoc(collection(db, 'users', currentUser.uid, 'documents'), { name, type, date, notes });
                showToast('✅ המסמך נוסף בהצלחה');
                document.getElementById('doc-name').value  = '';
                document.getElementById('doc-date').value  = '';
                document.getElementById('doc-notes').value = '';
            } catch {
                showToast('❌ שגיאה בשמירת המסמך');
            }
        };

        window.removeDoc = async id => {
            try {
                await fsDeleteDoc(fsDoc(db, 'users', currentUser.uid, 'documents', id));
                showToast('🗑️ המסמך נמחק');
            } catch {
                showToast('❌ שגיאה במחיקת המסמך');
            }
        };

        /* ── Edit modal ───────────────────────────────── */
        window.openEdit = id => {
            const d = docs.find(doc => doc.id === id);
            if (!d) return;
            populateTypeSelects(d.type);
            document.getElementById('edit-id').value    = d.id;
            document.getElementById('edit-name').value  = d.name;
            document.getElementById('edit-date').value  = d.date;
            document.getElementById('edit-notes').value = d.notes || '';
            document.getElementById('edit-modal').classList.add('open');
        };

        window.closeModal = () => {
            document.getElementById('edit-modal').classList.remove('open');
        };

        window.handleOverlayClick = e => {
            if (e.target === document.getElementById('edit-modal')) closeModal();
        };

        window.saveEdit = async () => {
            const id    = document.getElementById('edit-id').value;
            const name  = document.getElementById('edit-name').value.trim();
            const type  = document.getElementById('edit-type').value;
            const date  = document.getElementById('edit-date').value;
            const notes = document.getElementById('edit-notes').value.trim();
            if (!name)                 { showToast('⚠️ נא להזין שם מסמך');    return; }
            if (!date)                 { showToast('⚠️ נא לבחור תאריך פקיעה'); return; }
            if (type === ADD_SENTINEL) { showToast('⚠️ נא לבחור סוג מסמך');   return; }
            try {
                await setDoc(fsDoc(db, 'users', currentUser.uid, 'documents', id), { name, type, date, notes });
                closeModal();
                showToast('✅ המסמך עודכן');
            } catch {
                showToast('❌ שגיאה בעדכון המסמך');
            }
        };

        /* ── Keyboard shortcuts ───────────────────────── */
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && !document.getElementById('edit-modal').classList.contains('open')) {
                if (document.getElementById('doc-date').value) addDocument();
            }
        });

        /* ── Init (pre-auth render for empty state) ───── */
        populateTypeSelects();
        renderTypeChips();
        render();
    </script>
</body>

</html>
