<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב מסמכים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --card:     #22263a;
      --border:   #2e3352;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --text:     #e8eaf6;
      --muted:    #7b82a8;
      --red:      #ff4d6d;
      --orange:   #fb923c;
      --green:    #4ade80;
      --red-bg:   rgba(255, 77, 109,  0.12);
      --orange-bg:rgba(251, 146, 60,  0.12);
      --green-bg: rgba(74, 222, 128,  0.12);
      --radius:   14px;
      --shadow:   0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(108,99,255,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(167,139,250,.12) 0%, transparent 55%);
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      max-width: 720px;
      margin: 0 auto 36px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Add-form card ───────────────────────────────── */
    .form-card {
      max-width: 720px;
      margin: 0 auto 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
    }
    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-card h2::before { content: '➕'; font-size: 1rem; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }
    @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.95rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      direction: rtl;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.2);
    }
    select option { background: var(--card); }

    /* Date input — fix calendar icon colour in dark mode */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8);
      cursor: pointer;
    }

    .btn-add {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-add:hover  { opacity: 0.9; }
    .btn-add:active { transform: scale(0.98); }

    /* ── Stats bar ───────────────────────────────────── */
    .stats {
      max-width: 720px;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-chip {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-chip .num { font-size: 1.6rem; font-weight: 800; }
    .stat-chip .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .stat-chip.red    { border-color: var(--red);    background: var(--red-bg); }
    .stat-chip.orange { border-color: var(--orange); background: var(--orange-bg); }
    .stat-chip.green  { border-color: var(--green);  background: var(--green-bg); }
    .stat-chip.red    .num { color: var(--red); }
    .stat-chip.orange .num { color: var(--orange); }
    .stat-chip.green  .num { color: var(--green); }

    /* ── Document list ───────────────────────────────── */
    .list-header {
      max-width: 720px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-header h2 { font-size: 1.05rem; font-weight: 600; }
    .list-header .count {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .doc-list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Document card ───────────────────────────────── */
    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: slideIn 0.25s ease;
    }
    .doc-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Left accent strip */
    .doc-card::before {
      content: '';
      display: block;
      width: 4px;
      min-height: 52px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .doc-card.red    { border-color: var(--red);    background: var(--red-bg); }
    .doc-card.orange { border-color: var(--orange); background: var(--orange-bg); }
    .doc-card.green  { border-color: var(--green);  background: var(--green-bg); }
    .doc-card.red    ::before { background: var(--red); }
    .doc-card.orange ::before { background: var(--orange); }
    .doc-card.green  ::before { background: var(--green); }

    .doc-card .icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }

    .doc-info { flex: 1; min-width: 0; }
    .doc-info .name {
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-info .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .doc-info .type-badge {
      background: rgba(255,255,255,.07);
      border-radius: 6px;
      padding: 2px 9px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
    }
    .doc-info .date-str { font-size: 0.82rem; color: var(--muted); }

    .doc-card .urgency {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
      min-width: 80px;
    }
    .doc-card.red    .urgency { color: var(--red); }
    .doc-card.orange .urgency { color: var(--orange); }
    .doc-card.green  .urgency { color: var(--green); }

    .btn-delete {
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px 8px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-delete:hover {
      color: var(--red);
      border-color: var(--red);
      background: rgba(255,77,109,.08);
    }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
      padding: 64px 0;
      color: var(--muted);
    }
    .empty .emoji { font-size: 3.5rem; margin-bottom: 14px; }
    .empty p { font-size: 1rem; }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(108,99,255,.5);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>📋 מעקב מסמכים</h1>
  <p>עקוב אחר תוקף המסמכים שלך בקלות</p>
</header>

<!-- Add Form -->
<div class="form-card">
  <h2>הוספת מסמך חדש</h2>
  <div class="form-row">
    <div>
      <label for="doc-name">שם המסמך</label>
      <input type="text" id="doc-name" placeholder='למשל: ביטוח רכב' maxlength="60" />
    </div>
    <div>
      <label for="doc-type">סוג</label>
      <select id="doc-type">
        <option value="ביטוח">🛡️ ביטוח</option>
        <option value="דרכון">🛂 דרכון</option>
        <option value="פק&quot;מ">🏦 פק&quot;מ</option>
        <option value="אחר">📄 אחר</option>
      </select>
    </div>
    <div>
      <label for="doc-date">תאריך פקיעה</label>
      <input type="date" id="doc-date" />
    </div>
  </div>
  <button class="btn-add" onclick="addDocument()">הוסף מסמך</button>
</div>

<!-- Stats -->
<div class="stats" id="stats-bar"></div>

<!-- List header -->
<div class="list-header">
  <h2>המסמכים שלי</h2>
  <span class="count" id="doc-count">0 מסמכים</span>
</div>

<!-- Document cards -->
<div class="doc-list" id="doc-list"></div>
<div class="empty" id="empty-state" style="display:none">
  <div class="emoji">🗂️</div>
  <p>אין מסמכים עדיין — הוסף את המסמך הראשון שלך!</p>
</div>

<div id="toast"></div>

<script>
  /* ── Helpers ───────────────────────────────────────── */
  const TYPE_ICONS = { 'ביטוח':'🛡️', 'דרכון':'🛂', 'פק"מ':'🏦', 'אחר':'📄' };
  const MS_DAY = 86_400_000;

  function daysUntil(dateStr) {
    const exp = new Date(dateStr).setHours(0,0,0,0);
    const now = new Date().setHours(0,0,0,0);
    return Math.round((exp - now) / MS_DAY);
  }

  function urgencyClass(days) {
    if (days < 0)  return 'red';
    if (days <= 30) return 'red';
    if (days <= 60) return 'orange';
    return 'green';
  }

  function urgencyLabel(days) {
    if (days < 0)   return `⚠️ פג לפני ${Math.abs(days)} ימים`;
    if (days === 0) return '🔴 פג היום!';
    if (days <= 30) return `🔴 ${days} ימים`;
    if (days <= 60) return `🟠 ${days} ימים`;
    return `🟢 ${days} ימים`;
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  /* ── Storage ───────────────────────────────────────── */
  function load() {
    try { return JSON.parse(localStorage.getItem('docs') || '[]'); }
    catch { return []; }
  }
  function save(docs) {
    localStorage.setItem('docs', JSON.stringify(docs));
  }

  /* ── Toast ─────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  /* ── Render ────────────────────────────────────────── */
  function render() {
    const docs = load();
    const list = document.getElementById('doc-list');
    const empty = document.getElementById('empty-state');
    const countEl = document.getElementById('doc-count');
    const statsEl = document.getElementById('stats-bar');

    list.innerHTML = '';
    countEl.textContent = `${docs.length} מסמכים`;

    /* stats */
    let red = 0, orange = 0, green = 0;
    docs.forEach(d => {
      const cl = urgencyClass(daysUntil(d.date));
      if (cl === 'red') red++;
      else if (cl === 'orange') orange++;
      else green++;
    });
    statsEl.innerHTML = `
      <div class="stat-chip red">
        <div class="num">${red}</div>
        <div class="lbl">דחוף / פג</div>
      </div>
      <div class="stat-chip orange">
        <div class="num">${orange}</div>
        <div class="lbl">עומד לפוג</div>
      </div>
      <div class="stat-chip green">
        <div class="num">${green}</div>
        <div class="lbl">בסדר</div>
      </div>`;

    if (docs.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    /* sort: soonest first */
    const sorted = [...docs].sort((a, b) => new Date(a.date) - new Date(b.date));

    sorted.forEach(doc => {
      const days = daysUntil(doc.date);
      const cls  = urgencyClass(days);
      const card = document.createElement('div');
      card.className = `doc-card ${cls}`;
      card.innerHTML = `
        <div class="icon">${TYPE_ICONS[doc.type] || '📄'}</div>
        <div class="doc-info">
          <div class="name">${escHtml(doc.name)}</div>
          <div class="meta">
            <span class="type-badge">${escHtml(doc.type)}</span>
            <span class="date-str">פקיעה: ${formatDate(doc.date)}</span>
          </div>
        </div>
        <div class="urgency">${urgencyLabel(days)}</div>
        <button class="btn-delete" title="מחק מסמך" onclick="deleteDoc('${doc.id}')">🗑️</button>`;
      list.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Add ───────────────────────────────────────────── */
  function addDocument() {
    const name = document.getElementById('doc-name').value.trim();
    const type = document.getElementById('doc-type').value;
    const date = document.getElementById('doc-date').value;

    if (!name) { showToast('⚠️ נא להזין שם מסמך'); return; }
    if (!date) { showToast('⚠️ נא לבחור תאריך פקיעה'); return; }

    const docs = load();
    docs.push({ id: crypto.randomUUID(), name, type, date });
    save(docs);
    showToast('✅ המסמך נוסף בהצלחה');

    document.getElementById('doc-name').value = '';
    document.getElementById('doc-date').value = '';
    render();
  }

  /* ── Delete ────────────────────────────────────────── */
  function deleteDoc(id) {
    const docs = load().filter(d => d.id !== id);
    save(docs);
    showToast('🗑️ המסמך נמחק');
    render();
  }

  /* ── Enter key shortcut ────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('doc-date').value) addDocument();
  });

  /* ── Init ──────────────────────────────────────────── */
  render();
</script>
</body>
</html>
